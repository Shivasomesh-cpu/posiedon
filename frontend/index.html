<!doctype html>
<html lang="zh" data-theme="dark">
  <head>
    <script>
      // Initialize theme and locale from localStorage
      document.documentElement.lang = localStorage.getItem('locale') || 'zh';
      document.documentElement.setAttribute('data-theme', localStorage.getItem('mf-theme') || 'dark');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@100..800&family=Noto+Sans+SC:wght@300;400;500;700;800;900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MiroFish - AI-powered swarm intelligence prediction engine" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>MiroFish - Predict the Unpredictable</title>
    <style>
      /* Critical CSS for instant dark mode */
      html[data-theme="dark"] {
        background-color: #0a0a0f;
        color-scheme: dark;
      }
      html[data-theme="light"] {
        background-color: #fafafa;
        color-scheme: light;
      }
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
